<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin StarGame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app admin-page">
    <nav class="navbar">
      <a class="logo" href="index.html"><span>STAR<span>GAME</span></span></a>
      <div class="nav-links">
        <a href="index.html">Lihat Website</a>
        <button class="btn btn-pink" onclick="logoutAdmin()">Logout</button>
      </div>
    </nav>

    <section class="admin-wrap">
      <div class="admin-header">
        <h1>Dashboard Admin</h1>
        <p>Edit media, harga, dan jadwal. Semua perubahan realtime ke website.</p>
      </div>

      <div class="admin-grid-main">
        <div class="card admin-card-panel">
          <h2>Edit Website</h2>
          <label>Upload Logo</label>
          <input type="file" id="logoInput" accept="image/*">

          <label>Upload Hero Banner</label>
          <input type="file" id="heroInput" accept="image/*">

          <label>Upload Gambar Nintendo</label>
          <input type="file" id="nintendoImage" accept="image/*">

          <label>Upload Gambar Playbox</label>
          <input type="file" id="playboxImage" accept="image/*">

          <label>Harga Nintendo</label>
          <input type="text" id="nintendoPrice" placeholder="Contoh: 100.000">

          <label>Harga Playbox</label>
          <input type="text" id="playboxPrice" placeholder="Contoh: 200.000">

          <button class="wa-btn" onclick="saveWebsiteData()">Simpan Website</button>
        </div>

        <div class="card schedule admin-schedule-box">
          <h2>Kelola Jadwal</h2>
          <div id="adminScheduleList"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    if(localStorage.getItem("adminLogin") !== "true"){
      window.location.href = "login.html";
    }
    function logoutAdmin(){
      localStorage.removeItem("adminLogin");
      window.location.href = "login.html";
    }
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBvzqJC6kSsSC27m7AcOvrfQ9_44hms6TQ",
      authDomain: "stargamerental.firebaseapp.com",
      databaseURL: "https://stargamerental-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "stargamerental",
      storageBucket: "stargamerental.firebasestorage.app",
      messagingSenderId: "576904982238",
      appId: "1:576904982238:web:b7717c5ccba5f52596dc4f"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getDatabase(app);
    window.ref = ref;
    window.set = set;
    window.get = get;
    window.onValue = onValue;
    window.update = update;
    window.dispatchEvent(new Event("firebase-ready"));
  </script>
  <script src="script.js"></script>
</body>
</html>
